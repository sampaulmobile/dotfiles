
# ========== GENERAL ==========

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g history-limit 20000
set -sg escape-time 0
set -g display-time 1000
set -g repeat-time 300
set -g renumber-windows on
setw -g allow-rename off
setw -g automatic-rename on
setw -g aggressive-resize on
setw -g monitor-activity on
set -g visual-activity off
set -g visual-bell off
set -g bell-action none

# vim keys
setw -g mode-keys vi

# turn on mouse, and set toggle mouse mode with prefix+m
set-option -g mouse on
bind-key m set -g mouse\; display-message "mouse is now #{?mouse,on,off}"
# disable jump to bottom when highlighting text with mouse
unbind -T copy-mode-vi MouseDragEnd1Pane

# must be enabled for vim-tmux-focus-events
set -g focus-events on

# number windows/panes starting at 1
set -g base-index 1
setw -g pane-base-index 1

# Set parent terminal title to reflect current window in tmux session 
set -g set-titles on
set -g set-titles-string "#I:#W"
# set -g set-titles-string '#(whoami)@#h(#(curl ipecho.net/plain;echo))'


# ========== MAPPINGS ==========

# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# new window goes to home
bind c new-window -c "$HOME"

# new window splits retain CWD
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

# pane synchronization
bind S set synchronize-panes

# Movement of windows with Prefix + < and Prefix + >:
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# start with empty string when renaming windows/sessions
bind , command-prompt -p "(rename-window '#W')" "rename-window '%%'"
bind '$' command-prompt -p "(rename-session '#S')" "rename-session '%%'"

# When scrolling with mouse wheel, reduce number of scrolled rows per tick to "2" (default is 5)
bind -T copy-mode-vi WheelUpPane       select-pane \; send-keys -X -N 2 scroll-up
bind -T copy-mode-vi WheelDownPane     select-pane \; send-keys -X -N 2 scroll-down

# bind visual mode/yank to v/y in copy mode
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi y     send-keys -X copy-selection

# sessionizer - fuzzy find and switch to project sessions
bind-key -n C-f run-shell "tmux neww ~/dotfiles/bin/tmux-sessionizer"

# claude popup - toggle a floating claude session per project
bind-key -n C-Space run-shell '~/dotfiles/bin/tmux-claude-popup'

# hex codes for next/prev window
# next        0x02 0x6E
# previous    0x02 0x70
# bind -n C-S-[ previous-window
# bind -n C-S-] next-window


# ========== STATUS BAR ==========

set -g status on
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-right-length 100

# let catppuccin handle window styling
set-window-option -g window-status-current-format '#I #W'
set-window-option -g window-status-format '#I #W'

# when window has monitoring notification
setw -g window-status-activity-style "fg=white"

bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# show OFF when F12 disables keys (for nested tmux)
wg_is_keys_off="#([ $(tmux show-option -qv key-table) = 'off' ] && echo 'OFF')#[default]"

set -g status-left ""
set -g status-right "$wg_is_keys_off#{E:@catppuccin_status_session}"

# if were SSH'd in somewhere, load the remote.conf
if-shell 'test -n "$SSH_CLIENT"' 'source-file ~/.tmux.remote.conf'


# ========== ENV ==========

set -g update-environment \
  "DISPLAY\
  SSH_ASKPASS\
  SSH_AUTH_SOCK\
  SSH_AGENT_PID\
  SSH_CONNECTION\
  SSH_TTY\
  WINDOWID\
  XAUTHORITY"


# ========== PLUGINS ==========

set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'

# vim-like pane navigation
set -g @plugin 'christoomey/vim-tmux-navigator'

# catppuccin color scheme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# system clipboard in copy mode (uses pbcopy on Mac, xclip on Linux)
set -g @plugin 'tmux-plugins/tmux-yank'

# CPU/MEM for status line
# set -g @plugin 'samoshkin/tmux-plugin-sysstat'

# yet another CPU plugin
# set -g @plugin 'tmux-plugins/tmux-cpu'

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'
